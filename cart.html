<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klarna | Shopping Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ffb3c7; --black: #111; --gray-border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: var(--black); }
        .container { max-width: 900px; margin: 0 auto; padding: 0 25px; }
        
        .header { height: 90px; display: flex; align-items: center; border-bottom: 1px solid var(--gray-border); margin-bottom: 40px; }
        .header-inner { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo a { font-size: 28px; font-weight: 800; text-decoration: none; color: #000; }
        .nav-links a { text-decoration: none; color: var(--black); margin-left: 25px; font-weight: 600; font-size: 15px; }

        .cart-item { display: flex; align-items: center; gap: 25px; padding: 25px 0; border-bottom: 1px solid var(--gray-border); }
        .cart-item img { width: 120px; height: 90px; object-fit: cover; border-radius: 12px; }
        .item-details { flex: 1; }
        .item-details h4 { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
        
        .quantity-control { display: flex; align-items: center; gap: 15px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 700; }
        
        .item-price { font-weight: 800; font-size: 18px; min-width: 100px; text-align: right; }
        
        .summary-panel { margin-top: 50px; padding: 30px; background: #fafafa; border-radius: 20px; text-align: right; }
        .summary-panel h2 { font-size: 32px; margin-bottom: 20px; }
        .btn-checkout { background: var(--black); color: #fff; padding: 18px 50px; border-radius: 50px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-checkout:hover { background: var(--pink); color: var(--black); }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo"><a href="category.html">Klarna.</a></div>
            <nav class="nav-links">
                <a href="category.html">Catalog</a>
                <a href="favorites.html">
                    Favorites (<span id="favCount">0</span>)
                </a>
                <a href="cart.html" style="color: var(--pink);">
                    Cart (<span id="cartCount">0</span>)
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Your Shopping Cart</h1>
        <div id="cartList"></div>

        <div class="summary-panel" id="summaryPanel" style="display: none;">
            <p style="color: #666; margin-bottom: 10px;">Total amount to pay:</p>
            <h2>Total: $<span id="grandTotal">0</span></h2>
            <button onclick="completePurchase()" class="btn-checkout">Complete Purchase</button>
        </div>
    </main>

    <script>
        const API = 'http://127.0.0.1:3000/cart';

        async function loadCart() {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById('cartList');
            const summary = document.getElementById('summaryPanel');
            let total = 0;

            if (data.length === 0) {
                list.innerHTML = '<h2 style="margin-top: 40px; color: #888;">Your cart is empty.</h2>';
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            list.innerHTML = '';
            data.forEach(item => {
                total += item.price * item.quantity;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <p style="color: #888; font-size: 14px;">${item.category}</p>
                        </div>
                        <div class="quantity-control">
                            <button onclick="changeQuantity('${item.id}', ${item.quantity - 1})" class="btn-qty">-</button>
                            <span style="font-weight: 700;">${item.quantity}</span>
                            <button onclick="changeQuantity('${item.id}', ${item.quantity + 1})" class="btn-qty">+</button>
                        </div>
                        <div class="item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                        <button onclick="deleteItem('${item.id}')" style="margin-left: 20px; border: none; background: none; color: #ff4d4d; font-weight: 600; cursor: pointer;">Delete</button>
                    </div>`;
            });
            document.getElementById('grandTotal').innerText = total.toFixed(2);
        }

        async function changeQuantity(id, newQty) {
            if (newQty < 1) return deleteItem(id);
            await fetch(`${API}/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({quantity: newQty})
            });
            loadCart();
            updateCounters(); 
        }

        async function deleteItem(id) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            loadCart();
            updateCounters(); 
        }

        async function completePurchase() {
            const res = await fetch(API);
            const items = await res.json();
            for (const item of items) {
                await fetch(`${API}/${item.id}`, { method: 'DELETE' });
            }
            alert('Order placed successfully. Thank you for choosing Klarna.');
            loadCart();
            updateCounters(); 
        }

        async function updateCounters() {
            try {
                const favRes = await fetch('http://127.0.0.1:3000/favorites');
                const cartRes = await fetch('http://127.0.0.1:3000/cart');
                const favData = await favRes.json();
                const cartData = await cartRes.json();

                document.getElementById('favCount').textContent = favData.length;
                document.getElementById('cartCount').textContent = cartData.length;
            } catch (err) {
                console.error(err);
            }
        }

        loadCart();
        updateCounters();
    </script>
</body>
</html>
