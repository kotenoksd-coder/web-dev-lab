<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klarna | Favorites</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ffb3c7; --black: #111; --gray-light: #f8f8f8; --gray-border: #eee; --text-muted: #666; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: var(--black); }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 25px; }
        
        .header { height: 90px; display: flex; align-items: center; border-bottom: 1px solid var(--gray-border); position: sticky; top: 0; background: #fff; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo a { font-size: 28px; font-weight: 800; text-decoration: none; color: #000; letter-spacing: -1.2px; }
        .nav-links a { text-decoration: none; color: var(--black); margin-left: 25px; font-weight: 600; font-size: 15px; }
        
        .hero { padding: 60px 0 40px; text-align: center; }
        .hero h1 { font-size: 40px; font-weight: 800; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding-bottom: 80px; }
        .card { text-decoration: none; color: inherit; }
        .img-wrap { width: 100%; aspect-ratio: 16/10; background: var(--gray-light); border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .card-price { font-weight: 800; font-size: 18px; margin-bottom: 10px; display: block; }
        
        .btn-remove { background: #f0f0f0; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-remove:hover { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo"><a href="category.html">Klarna.</a></div>
            <nav class="nav-links">
                <a href="category.html">Catalog</a>
                <a href="favorites.html" style="color: var(--pink);">
                    Favorites (<span id="favCount">0</span>)
                </a>
                <a href="cart.html">
                    Cart (<span id="cartCount">0</span>)
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero"><h1>Favorites</h1></section>
        <div class="cards-grid" id="favoritesGrid"></div>
    </main>

    <script>
        const API = 'http://127.0.0.1:3000/favorites';

        async function loadFavorites() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const grid = document.getElementById('favoritesGrid');
                
                if (data.length === 0) {
                    grid.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center; color: #888;">Your favorites list is empty.</h2>';
                    return;
                }

                grid.innerHTML = '';
                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="img-wrap"><img src="${item.img}"></div>
                            <h4 class="card-title">${item.name}</h4>
                            <span class="card-price">$${item.price}</span>
                            <button onclick="removeItem('${item.id}')" class="btn-remove">Remove from favorites</button>
                        </div>`;
                });
            } catch (e) {
                console.error("Error loading favorites");
            }
        }

        async function removeItem(id) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            loadFavorites();
            updateCounters(); 
        }

        async function updateCounters() {
            try {
                const favRes = await fetch('http://127.0.0.1:3000/favorites');
                const cartRes = await fetch('http://127.0.0.1:3000/cart');
                const favData = await favRes.json();
                const cartData = await cartRes.json();

                document.getElementById('favCount').textContent = favData.length;
                document.getElementById('cartCount').textContent = cartData.length;
            } catch (err) {
                console.error(err);
            }
        }

        loadFavorites();
        updateCounters();
    </script>
</body>
</html>
