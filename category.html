<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klarna | Premium Store Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ffb3c7;
            --pink-dark: #f7a1b8;
            --black: #111111;
            --white: #ffffff;
            --gray-bg: #f6f6f6;
            --gray-border: #eeeeee;
            --text-muted: #666666;
            --radius-pill: 50px;
            --radius-card: 20px;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--white); color: var(--black); line-height: 1.5; overflow-x: hidden; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }

        /* --- HEADER --- */
        .header { height: 90px; display: flex; align-items: center; border-bottom: 1px solid var(--gray-border); position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo a { font-size: 30px; font-weight: 800; text-decoration: none; color: var(--black); letter-spacing: -1.5px; }
        .nav-links a { text-decoration: none; color: var(--black); margin-left: 25px; font-weight: 600; font-size: 15px; transition: var(--transition); }
        .nav-links a:hover { color: var(--pink); }

        /* --- HERO & SEARCH --- */
        .hero-section { padding: 80px 0 40px; text-align: center; background: radial-gradient(circle at top right, #fff5f8, #ffffff); }
        .hero-section h1 { font-size: 56px; font-weight: 800; letter-spacing: -2.5px; margin-bottom: 20px; }
        .search-container { max-width: 700px; margin: 0 auto; position: relative; }
        .search-input { width: 100%; padding: 22px 35px; border-radius: var(--radius-pill); border: 2px solid var(--gray-border); font-size: 18px; outline: none; transition: var(--transition); background: var(--white); box-shadow: var(--shadow-soft); }
        .search-input:focus { border-color: var(--pink); transform: translateY(-2px); box-shadow: 0 15px 40px rgba(255, 179, 199, 0.2); }

        /* --- METHODS DASHBOARD --- */
        .methods-panel { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 40px 0; padding: 25px; background: var(--gray-bg); border-radius: var(--radius-card); }
        .method-btn { padding: 12px 24px; border-radius: var(--radius-pill); border: 1px solid #ddd; background: var(--white); font-weight: 700; font-size: 13px; cursor: pointer; transition: var(--transition); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .method-btn:hover { border-color: var(--pink); color: var(--pink); transform: translateY(-2px); }
        .method-btn.reset { background: var(--black); color: var(--white); border: none; }

        /* --- LAYOUT --- */
        .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 60px; margin-top: 20px; padding-bottom: 100px; }

        /* --- SIDEBAR --- */
        .sidebar h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; border-bottom: 2px solid var(--pink); display: inline-block; padding-bottom: 5px; }
        .filter-group { margin-bottom: 40px; }
        .filter-item { display: flex; align-items: center; margin-bottom: 15px; cursor: pointer; font-size: 16px; font-weight: 500; transition: 0.2s; }
        .filter-item:hover { color: var(--pink); }
        .filter-item input { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--pink); cursor: pointer; }
        
        .price-inputs { display: flex; gap: 15px; }
        .price-inputs input { width: 100%; padding: 12px 15px; border: 2px solid var(--gray-border); border-radius: 12px; outline: none; transition: 0.3s; font-weight: 600; }
        .price-inputs input:focus { border-color: var(--pink); }

        .sort-select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--gray-border); font-weight: 700; cursor: pointer; outline: none; background: var(--white); }

        /* --- GRID --- */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .result-count { font-weight: 700; color: var(--text-muted); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        /* --- PREMIUM CARD --- */
        .card { text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: var(--transition); position: relative; }
        .card:hover { transform: translateY(-10px); }
        
        .img-wrap { width: 100%; aspect-ratio: 16/11; background: var(--gray-bg); border-radius: var(--radius-card); overflow: hidden; position: relative; margin-bottom: 20px; border: 1px solid var(--gray-border); }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover .img-wrap img { transform: scale(1.08); }
        
        .card-tag { position: absolute; top: 15px; left: 15px; background: var(--white); padding: 6px 15px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: var(--black); }
        
        .card-cat { font-size: 12px; color: var(--pink-dark); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .card-desc { font-size: 15px; color: var(--text-muted); height: 45px; overflow: hidden; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--gray-border); }
        .price { font-weight: 800; font-size: 22px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-add { background: var(--pink); border: none; padding: 10px 22px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--black); color: var(--white); }
        .btn-fav { border: 2px solid var(--gray-border); background: none; padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 18px; }
        .btn-fav:hover { border-color: var(--pink); color: var(--pink); }

        /* --- PAGINATION --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 80px 0; }
        .btn-page { padding: 15px 35px; border-radius: var(--radius-pill); border: 2px solid var(--gray-border); background: var(--white); cursor: pointer; font-weight: 800; transition: 0.3s; font-size: 15px; }
        .btn-page:hover:not(:disabled) { border-color: var(--pink); transform: scale(1.05); }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
        #pageNum { font-weight: 800; font-size: 18px; min-width: 100px; text-align: center; }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-msg { grid-column: 1/-1; text-align: center; padding: 100px 0; }

        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
        #toast{
    position: fixed;
    right: 25px;
    bottom: 25px;
    background: #111;
    color: white;
    padding: 16px 24px;
    border-radius: 14px;
    font-weight: 700;
    z-index: 9999;

    opacity: 0;
    visibility: hidden;

    transform: translateY(20px);
    transition: .3s;
}

#toast.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

#toast.success{
    background: #1f8b4c;
}

#toast.favorite{
    background: #e84c7f;
}
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <div class="logo"><a href="index.html">Klarna.</a></div>
            <nav class="nav-links">
    <a href="category.html">Catalog</a>
    <a href="favorites.html">
        Favorites (<span id="favCount">0</span>)
    </a>
    <a href="cart.html">
        Cart (<span id="cartCount">0</span>)
    </a>
</nav>
        </div>
    </header>

    <main class="container">
        <section class="hero-section">
            <h1 id="page-title">Store Directory</h1>
            <div class="search-wrap">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name, category or brand...">
            </div>
        </section>

        <div class="methods-panel">
            <button class="method-btn" onclick="jsMethod('map')">Map: Discount -10%</button>
            <button class="method-btn" onclick="jsMethod('filter')">Filter: Travel Only</button>
            <button class="method-btn" onclick="jsMethod('reduce')">Reduce: Total Value</button>
            <button class="method-btn" onclick="jsMethod('sortName')">Sort: Name A-Z</button>
            <button class="method-btn reset" onclick="resetAll()">✕ Reset All</button>
        </div>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="filter-group">
                    <h3>Categories</h3>
                    <div id="catFilters"></div>
                </div>

                <div class="filter-group">
                    <h3>Price Range</h3>
                    <div class="price-inputs">
                        <input type="number" id="minPrice" placeholder="Min $">
                        <input type="number" id="maxPrice" placeholder="Max $">
                    </div>
                </div>

                <div class="filter-group">
                    <h3>Sort Order</h3>
                    <select id="sortSelect" class="sort-select">
                        <option value="default">Recommended</option>
                        <option value="low">Price: Low to High</option>
                        <option value="high">Price: High to Low</option>
                        <option value="rating">Top Rated</option><option value="name">Name A-Z</option>
                    </select>
                </div>
            </aside>

            <section class="grid-container">
                <div class="toolbar">
                    <span id="productCount" class="result-count">Loading services...</span>
                </div>
                
                <div class="product-grid" id="productGrid"></div>
                
                <div class="pagination">
                    <button id="prevBtn" class="btn-page">Back</button>
                    <span id="pageNum">Page 1</span>
                    <button id="nextBtn" class="btn-page">Next</button>
                </div>
            </section>
        </div>
    </main>

    <script>
        const API = 'http://localhost:3000/services';
        let page = 1;
        const limit = 6;
        const grid = document.getElementById('productGrid');
        const countText = document.getElementById('productCount');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const minP = document.getElementById('minPrice');
        const maxP = document.getElementById('maxPrice');
        const mainTitle = document.getElementById('page-title');

        async function loadData() {
            mainTitle.innerText = "Store Directory";
           let url = `${API}?_page=${page}&_per_page=${limit}`;

            if(searchInput.value) url += `&q=${encodeURIComponent(searchInput.value)}`;
            
            if(sortSelect.value === 'low') url += `&_sort=price&_order=asc`;
            if(sortSelect.value === 'high') url += `&_sort=price&_order=desc`;
            if(sortSelect.value === 'rating') url += `&_sort=rating&_order=desc`;
            if(sortSelect.value === 'name') url += `&_sort=name&_order=asc`;

            if(minP.value) url += `&price_gte=${minP.value}`;
            if(maxP.value) url += `&price_lte=${maxP.value}`;

            const activeCats = Array.from(document.querySelectorAll('#catFilters input:checked')).map(i => i.value);
            activeCats.forEach(c => url += `&category=${c}`);

try {
                console.log("URL:", url);

                const res = await fetch(url);
                console.log("STATUS:", res.status);

                const data = await res.json();
                console.log("DATA:", data);

                const catBox = document.getElementById('catFilters');
                if (catBox.children.length === 0) {
                    const allRes = await fetch(API);
                    const allData = await allRes.json();
                    const categories = new Set(allData.map(item => item.category));
                    
                    catBox.innerHTML = '';
                    categories.forEach(cat => {
                        catBox.innerHTML += `
                            <label class="filter-item">
                                <input type="checkbox" value="${cat}" onchange="page = 1; loadData();">
                                ${cat}
                            </label>
                        `;
                    });
                }

                const itemsToRender = data.data || data;
                const total = data.items || res.headers.get('X-Total-Count') || res.headers.get('x-total-count') || 42;

                render(itemsToRender);

                countText.innerText = `${total} stores found`;
                updatePagination(total);

            } catch (e) {
    console.error("ERROR:", e);

    grid.innerHTML =
        '<div class="empty-msg"><h2 style="color:red">JSON Server is offline!</h2></div>';
}
        }

        // --- RENDER CARDS ---
        function render(items) {
            grid.innerHTML = '';
            if(items.length === 0) {
                grid.innerHTML = '<div class="empty-msg"><h3>No results found for your search.</h3></div>';
                return;
            }
            items.forEach((p, idx) => {
                grid.innerHTML += `
                    <div class="card" style="animation: fadeInUp 0.6s ease both; animation-delay: ${idx * 0.07}s">
                        <div class="img-wrap">
                            ${p.isNew ? '<span class="card-tag">Partner</span>' : ''}
                            <img src="${p.img}" alt="${p.name}">
                        </div>
                        <p class="card-cat">${p.category} • ★ ${p.rating}</p>
                        <h4 class="card-title">${p.name}</h4>
                        <p class="card-desc">${p.desc}</p>
                        <div class="card-footer">
                            <span class="price">$${p.price}</span>
                            <div class="btn-group">
                                <button type="button" onclick="addToCart('${p.id}')" class="btn-add">Add</button>
                                <button type="button" onclick="addToFav('${p.id}')" class="btn-fav">❤</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function jsMethod(type) {
            const allRes = await fetch(API); 
            const all = await allRes.json();
            let result = [];
            
            if(type === 'map') {
                result = all.map(p => ({...p, price: Math.round(p.price * 0.9)})).slice(0, 6);
                mainTitle.innerText = "Applied: -10% Discount (map)";
            } else if(type === 'filter') {
                result = all.filter(p => p.category === 'Travel').slice(0, 6);
                mainTitle.innerText = "Applied: Travel Only (filter)";
            } else if(type === 'reduce') {
                const sum = all.reduce((acc, p) => acc + p.price, 0);
                alert(`The total value of all 42 services is: $${sum}`);
                return;
            } else if(type === 'sortName') {
                result = all.sort((a,b) => a.name.localeCompare(b.name)).slice(0, 6);
                mainTitle.innerText = "Applied: Sorted A-Z (sort)";
            }
            render(result);
            countText.innerText = "Calculated preview (first 6 items)";
        }

async function addToCart(id) {
    const item = await (await fetch(`${API}/${id}`)).json();

    await fetch('http://localhost:3000/cart', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            ...item,
            quantity: 1
        })
    });

    updateCounters();

    showToast('🛒 Added to cart!', 'success');
}

async function addToFav(id) {
    const item = await (await fetch(`${API}/${id}`)).json();

    await fetch('http://localhost:3000/favorites', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(item)
    });

    updateCounters();

    showToast('❤ Added to favorites!', 'favorite');
}
function showToast(text, type = 'success') {

    const toast = document.getElementById('toast');

    toast.innerText = text;

    toast.className = '';
    toast.classList.add('show');
    toast.classList.add(type);

    setTimeout(() => {
        toast.classList.remove('show');
    }, 2500);
}

        
async function updateCounters() {
    try {
        const favRes = await fetch('http://localhost:3000/favorites');
        const cartRes = await fetch('http://localhost:3000/cart');

        const favData = await favRes.json();
        const cartData = await cartRes.json();

        document.getElementById('favCount').textContent =
            Array.isArray(favData) ? favData.length : (favData.data || []).length;

        document.getElementById('cartCount').textContent =
            Array.isArray(cartData) ? cartData.length : (cartData.data || []).length;
    } catch (err) {
        console.error(err);
    }
}
        
        function updatePagination(total) {
            document.getElementById('pageNum').innerText = `Page ${page}`;
            document.getElementById('prevBtn').disabled = (page === 1);
            document.getElementById('nextBtn').disabled = (page * limit >= total);
        }

        function resetAll() {
            searchInput.value = '';
            minP.value = '';
            maxP.value = '';
            sortSelect.value = 'default';
            document.querySelectorAll('#catFilters input').forEach(i => i.checked = false);
            page = 1;
           
            loadData();
        }

        document.getElementById('nextPage')?.remove();
        document.getElementById('nextBtn').onclick = () => { page++; loadData(); };
        document.getElementById('prevBtn').onclick = () => { if(page > 1) { page--; loadData(); } };

        [searchInput, sortSelect, minP, maxP].forEach(el => el.oninput = () => { page = 1; loadData(); });

        loadData();
updateCounters();
function showToast(text, type = 'success') {

    const toast = document.getElementById('toast');

    toast.innerText = text;

    toast.className = '';
    toast.classList.add('show');
    toast.classList.add(type);

    setTimeout(() => {
        toast.classList.remove('show');
    }, 2500);
}
    </script>
<div id="toast"></div>
</body>
</html>
